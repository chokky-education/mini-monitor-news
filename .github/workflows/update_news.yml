name: Update News

on:
  schedule:
    # รันอัตโนมัติทุกๆ 2 ชั่วโมง
    - cron: '0 */2 * * *'
  workflow_dispatch: # อนุญาตให้กดรันเองได้จากหน้าเว็บ GitHub

jobs:
  run-scraper-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # จำเป็นสำหรับการ Commit กลับไปยัง Repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Scraper
        run: python scraper.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          # หาสิ่งที่มีการเปลี่ยนแปลง ถ้ามีให้ Commit และ Push
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update news: $(date +'%Y-%m-%d %H:%M')" && git push)
